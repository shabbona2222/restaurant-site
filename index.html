<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Lutf Restoran</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* qora overlay */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:0;
}

/* umumiy text */
section, h2, h3, p {
  color:white;
}

/* NAV va layout */
.nav, section, .cart{
  position:relative;
  z-index:2;
}

.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:white;
  padding:12px;
  position:sticky;
  top:0;
}

.nav a{
  cursor:pointer;
  font-weight:bold;
  color:#d60000;
}

section{display:none;padding:20px;}
.active{display:block}

/* HOME text qora */
#home h1, #home h3, #home p{
  color:black;
}

/* HERO */
.hero{
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* MENU */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:12px;
  text-align:center;
  color:black;
}

/* 🔥 ENG MUHIM TUZATISH */
.card h4,
.card p{
  color:black;   /* narxlar endi ko‘rinadi */
}

/* image */
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:999;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  width:320px;
  color:black;
}

input, textarea{
  width:100%;
  padding:8px;
  margin-top:8px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a onclick="show('home')">HOME</a>
<a onclick="show('menu')">MENU</a>
<a onclick="show('reviews')">FIKR</a>
<a onclick="show('booking')">JOY BAND</a>
<a onclick="show('location')">MANZIL</a>
</div>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>LUTF RESTORAN</h1>
<h3>Assalomu alaykum Lutf restoraniga marhamat</h3>
<p>Milliy taomlar</p>
</div>
</section>

<!-- MENU -->
<section id="menu">
<h2>🍽 MENU</h2>
<div class="grid" id="menuList"></div>
</section>

<!-- FIKR -->
<section id="reviews">
<h2>Fikr yozing</h2>
<input id="name" placeholder="Ism">
<textarea id="text" placeholder="Fikr"></textarea>
<button onclick="addReview()">Yuborish</button>
<div id="reviewList"></div>
</section>

<!-- BOOKING -->
<section id="booking">
<h2>Joy band qilish</h2>
<input id="bname" placeholder="Ism">
<input id="bphone" placeholder="Telefon">
<input id="bpeople" placeholder="Kishi soni">
<input id="baddress" placeholder="Manzil">
<button onclick="book()">Yuborish</button>
</section>

<!-- LOCATION -->
<section id="location">
<h2>📍 MANZIL</h2>

<p>Toshkent, Shota Rustaveli 105</p>
<p>📞 +99894431127</p>

<h3>🚀 Biz sayt yaratib beramiz</h3>
<p>Aloqaga chiqing</p>

<p>💳 OLDINDAN TO‘LOV: 4073420043009707</p>

<iframe width="100%" height="250"
src="https://maps.google.com/maps?q=Tashkent&output=embed"></iframe>
</section>

<!-- CART -->
<div class="cart" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">
<h3>Savat</h3>
<div id="cartList"></div>

<input id="address" placeholder="Manzil">
<input id="phone" placeholder="Telefon">

<button onclick="order()">Buyurtma berish</button>
<button onclick="closeCart()">Yopish</button>
</div>
</div>

<script>

const foods=[
{name:"Osh",price:45000,img:"https://images.unsplash.com/photo-1606491956689-2ea866880c84"},
{name:"Manti",price:40000,img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"},
{name:"Shashlik",price:35000,img:"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"},
{name:"Kabob",price:60000,img:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba"},
{name:"Somsa",price:12000,img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Choy",price:5000,img:"https://images.unsplash.com/photo-1511920170033-f8396924c348"},
{name:"Kofe",price:12000,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Cola",price:10000,img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97"},
{name:"Non",price:3000,img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"},
{name:"Desert",price:20000,img:"https://images.unsplash.com/photo-1551024601-bec78aea704b"}
];

let cart=[];

function render(){
let html="";
foods.forEach(f=>{
html+=`
<div class="card">
<img src="${f.img}">
<h4>${f.name}</h4>
<p>${f.price} so'm</p>
<button onclick="add('${f.name}',${f.price})">Savatga</button>
</div>`;
});
document.getElementById("menuList").innerHTML=html;
}
render();

function add(n,p){
cart.push({n,p});
document.getElementById("count").innerText=cart.length;
}

function openCart(){
let html="",sum=0;
cart.forEach(i=>{
html+=i.n+" - "+i.p+"<br>";
sum+=i.p;
});
html+="<hr><b>Jami: "+sum+"</b>";
document.getElementById("cartList").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

function closeCart(){
document.getElementById("modal").style.display="none";
}

function order(){
let a=document.getElementById("address").value;
let p=document.getElementById("phone").value;

if(!a || !p){
alert("To‘ldiring!");
return;
}

alert("Buyurtma qabul qilindi!");
cart=[];
document.getElementById("count").innerText=0;
closeCart();
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function addReview(){
let n=document.getElementById("name").value;
let t=document.getElementById("text").value;
document.getElementById("reviewList").innerHTML+=`<p><b>${n}</b>: ${t}</p>`;
}

function book(){
alert("Band qilindi!");
}

</script>

</body>
</html>
